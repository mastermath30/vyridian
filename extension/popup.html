<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vyridian</title>
  <style>
    /* ── Variables ───────────────────────────────────────── */
    :root {
      --bg:           #06080a;
      --surface:      #0d1114;
      --surface-2:    #141b20;
      --surface-3:    #1a2228;
      --border:       rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text:         #f2f4f6;
      --text-2:       #8c9099;
      --text-3:       #4e545c;
      --accent:       #00d47f;
      --accent-dim:   rgba(0,212,127,0.18);
      --accent-glow:  rgba(0,212,127,0.12);
      --danger:       #f04f4f;
      --danger-bg:    rgba(240,79,79,0.10);
      --warn:         #f5a623;
      --warn-bg:      rgba(245,166,35,0.10);
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 14px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: -apple-system, 'Segoe UI', Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 380px;
      min-height: 100px;
      max-height: 600px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      font-size: 14.5px;
      color: var(--text);
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-name {
      font-size: 11px;
      color: var(--text-2);
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .open-btn {
      font-size: 11px;
      color: var(--text-2);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .open-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Body ────────────────────────────────────────────── */
    .body {
      padding: 14px;
      padding-bottom: 20px;
    }

    /* ── Card base ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 2px 8px rgba(0,0,0,0.4);
    }

    /* ── Product card ────────────────────────────────────── */
    .product-store {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(255,255,255,0.07);
      color: var(--text-2);
      display: inline-block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .product-name {
      font-weight: 700;
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      margin-top: 8px;
      display: block;
    }

    .product-meta {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px;
    }

    .bm-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .bm-stat {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 2px 8px;
    }

    /* ── Section label ───────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .section-label::before {
      content: "";
      display: block;
      width: 3px;
      height: 10px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.6;
      flex-shrink: 0;
    }

    /* ── Financial impact card ───────────────────────────── */
    .impact-card {
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid;
    }
    .impact-minor      { background: rgba(0,212,127,0.06);  border-color: rgba(0,212,127,0.2); }
    .impact-moderate   { background: rgba(245,166,35,0.07); border-color: rgba(245,166,35,0.22); }
    .impact-significant { background: rgba(240,79,79,0.08); border-color: rgba(240,79,79,0.2); }

    /* ── Impact metrics two-col grid ─────────────────────── */
    .impact-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .metric-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .metric-value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .metric-label {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 3px;
      line-height: 1.3;
    }

    .metric-accent { color: var(--accent); }
    .metric-warn   { color: var(--warn); }
    .metric-danger { color: var(--danger); }

    /* ── Mini progress bar ───────────────────────────────── */
    .mini-bar-track {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
      margin: 8px 0 4px;
    }
    .mini-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.6s ease;
    }
    .bar-green  { background: var(--accent); }
    .bar-yellow { background: var(--warn); }
    .bar-red    { background: var(--danger); }

    .bar-label {
      font-size: 10px;
      color: var(--text-3);
      text-align: right;
    }

    .impact-detail {
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1.55;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Sustainability ───────────────────────────────────── */
    .sust-score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sust-score-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
    }

    .sust-score-fill {
      height: 100%;
      border-radius: 100px;
    }

    .sust-score-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      flex-shrink: 0;
    }

    .sust-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .sust-high   { background: rgba(0,212,127,0.12); color: var(--accent); border: 1px solid rgba(0,212,127,0.25); }
    .sust-medium { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(245,166,35,0.25); }
    .sust-low    { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(240,79,79,0.22); }

    .info-value {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ── Alternative card ────────────────────────────────── */
    .alt-card {
      background: linear-gradient(135deg, rgba(0,212,127,0.07) 0%, rgba(0,212,127,0.03) 100%);
      border: 1px solid rgba(0,212,127,0.22);
      border-left: 3px solid var(--accent);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .alt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .alt-name {
      font-weight: 700;
      font-size: 13.5px;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .alt-price {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .alt-reason {
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1.5;
    }

    .savings-badge {
      font-size: 10px;
      font-weight: 800;
      background: var(--accent);
      color: #000;
      padding: 3px 9px;
      border-radius: 100px;
      flex-shrink: 0;
    }

    /* ── CTA Buttons ─────────────────────────────────────── */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 11px;
      font-weight: 600;
      font-size: 13px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      border: none;
      font-family: inherit;
      letter-spacing: -0.01em;
    }

    .cta-primary {
      background: linear-gradient(135deg, #00d47f 0%, #00b870 100%);
      color: #000;
      margin-bottom: 8px;
      box-shadow: 0 4px 16px rgba(0,212,127,0.22);
      font-weight: 700;
    }
    .cta-primary:hover {
      box-shadow: 0 4px 24px rgba(0,212,127,0.35);
      transform: translateY(-1px);
    }

    .cta-secondary {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .cta-secondary:hover {
      border-color: var(--border-strong);
      color: var(--text);
    }

    /* ── Get started button ───────────────────────────────── */
    .get-started-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 20px;
      background: linear-gradient(135deg, #00d47f 0%, #00b870 100%);
      color: #000;
      font-weight: 700;
      font-size: 13px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      margin-top: 12px;
      box-shadow: 0 4px 16px rgba(0,212,127,0.22);
      letter-spacing: -0.01em;
    }
    .get-started-btn:hover {
      box-shadow: 0 4px 24px rgba(0,212,127,0.35);
      transform: translateY(-1px);
    }

    /* ── Error ───────────────────────────────────────────── */
    .error-box {
      background: var(--danger-bg);
      border: 1px solid rgba(240,79,79,0.22);
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 12px;
      color: var(--danger);
      margin-bottom: 10px;
    }

    /* ── States ──────────────────────────────────────────── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 16px;
      gap: 10px;
    }
    .state-icon  { font-size: 30px; }
    .state-title { font-weight: 600; font-size: 14px; color: var(--text); }
    .state-sub   { font-size: 12px; color: var(--text-3); max-width: 240px; line-height: 1.55; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" role="banner">
      <div class="logo-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22c5-4 8-8 8-12A8 8 0 0 0 4 10c0 4 3 8 8 12z"/>
        </svg>
      </div>
      Vyridian
    </div>
    <div class="header-right">
      <span class="user-name" id="user-name" style="display:none"></span>
      <button class="open-btn" id="open-dashboard" aria-label="Open Vyridian dashboard">
        Dashboard ↗
      </button>
    </div>
  </header>
  <main class="body" id="main" role="main" aria-live="polite" aria-atomic="false">
  </main>
  <script src="popup.js"></script>
</body>
</html>
